<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Marte - Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div style="font-weight: bold; font-size: 1.5rem;">BASE ESPACIAL // MARTE</div>
        <div class="stat-group">
            <span id="contador_dias">DÍA: [ 000 ]</span>
            <span>NIVEL: [ 01 ]</span>
            <span>TRIPULACIÓN: [ 30/30 ]</span>
        </div>
    </header>

    <main id="main_view">
        <div class="dome-label">VISTA DOMO PRINCIPAL</div>
        <!-- Aquí irían los módulos dibujados con divs o imágenes -->
    </main>

    <aside class="glass-panel">
        <div>
            <h3 style="margin-top: 0;">ESTADO RECURSOS</h3>
            <ul class="resource-list">
                <li><span>COMIDA</span> <span id="cant_comida">-</span></li>
                <li><span>AGUA</span> <span id="cant_agua">-</span></li>
                <li><span>OXÍGENO</span> <span id="cant_oxigeno">-</span></li>
                <li><span>NUTRIENTES</span> <span id="cant_nutrientes">-</span></li>
                <li><span>ENERGÍA</span> <span id="cant_energia">-</span></li>
            </ul>
        </div>

        <div style="flex-grow: 1;">
            <h3>PANEL DE CONTROL</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-action">CREAR MODULO</button>
                <button class="btn-action">GESTIONAR MÓDULO 1</button>
                <button id="button_catalog" class="btn-action">CATÁLOGO DE SEMILLAS</button>
            </div>
        </div>

        <button id="button_advance_day" class="btn-action btn-alert" style="padding: 20px; font-size: 1.2rem;">AVANZAR CICLO DÍA</button>
    </aside>

    <footer class="glass-panel">
        <!-- <div class="log-entry" style="color: #94a3b8;">SISTEMA INICIADO... [OK]</div>
        <div class="log-entry" style="color: #94a3b8;">RECURSOS OPTIMIZADOS.</div>
        <div class="log-entry">INVENTARIO ACTUALIZADO: SE HAN CONSUMIDO 5 UNIDADES DE COMIDA.</div>
        <div class="log-entry" style="color: var(--neon-alert);">ADVERTENCIA: SE DETECTA TORMENTA DE ARENA
            APROXIMÁNDOSE. PANELES SOLARES AL 50%.</div>
        <div class="log-entry animate-pulse" style="margin-top: 10px;">ESPERANDO COMANDO_</div> -->
    </footer>

    <script src="main.js"></script>
</body>

</html>
